name: aiaa
description: AI Job Application Agent
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  go_router: ^14.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  file_picker: ^8.0.0
  get_it: ^7.6.7
  equatable: ^2.0.5
  dartz: ^0.10.1
  flutter_dotenv: ^5.1.0
  json_annotation: ^4.8.1
  intl: ^0.19.0
  share_plus: ^10.0.0
  receive_sharing_intent: ^1.8.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  pretty_dio_logger: ^1.4.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env

